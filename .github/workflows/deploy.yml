name: Deploy to VPS

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve release version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create Git tag
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          HEAD_SHA=$(git rev-parse HEAD)

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            TAG_SHA=$(git rev-parse "$TAG")
            if [ "$TAG_SHA" = "$HEAD_SHA" ]; then
              echo "Tag ${TAG} already points to HEAD"
              exit 0
            fi
            echo "::error::Tag ${TAG} already exists on ${TAG_SHA}, but HEAD is ${HEAD_SHA}. Bump package.json version before merging."
            exit 1
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"

  build:
    runs-on: ubuntu-latest
    needs: tag

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Load secrets from 1Password
        uses: 1password/load-secrets-action@v4
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          OP_ENV_FILE: ".github/deploy.env.tpl"

      - name: Construct DATABASE_URL
        run: bash scripts/construct-database-url.sh

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Clean previous build artifacts
        run: rm -rf .next

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          NEXTAUTH_URL: ${{ env.NEXTAUTH_URL }}
          NEXT_PUBLIC_NEXTAUTH_URL: ${{ env.NEXTAUTH_URL }}
          NEXTAUTH_SECRET: ${{ env.NEXTAUTH_SECRET }}
          AUTH_GOOGLE_ID: ${{ env.AUTH_GOOGLE_ID }}
          AUTH_GOOGLE_SECRET: ${{ env.AUTH_GOOGLE_SECRET }}
          NEXT_PUBLIC_GA_ID: ${{ env.NEXT_PUBLIC_GA_ID }}

      - name: Create archive
        run: |
          tar -czf deploy.tar.gz package.json package-lock.json public .next prisma next.config.ts scripts lib tsconfig.json

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: build-artifact
          path: deploy.tar.gz
          if-no-files-found: error

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: build-artifact
          path: ./

      - name: Load secrets from 1Password
        uses: 1password/load-secrets-action@v4
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          OP_ENV_FILE: ".github/deploy.env.tpl"

      - name: Construct DATABASE_URL
        run: bash scripts/construct-database-url.sh

      - name: Install SSH Key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ env.SSH_PRIVATE_KEY }}
          known_hosts: "just-a-placeholder-so-we-dont-get-errors"
          if_key_exists: replace

      - name: Adding Known Hosts
        run: ssh-keyscan -p "${SSH_PORT}" -H "${HOST}" >> ~/.ssh/known_hosts

      - name: Deploy archive
        run: |
          scp -P "${SSH_PORT}" deploy.tar.gz "${USERNAME}@${HOST}:${TARGET_DIR}/deploy.tar.gz"

      - name: Post-deployment tasks
        uses: appleboy/ssh-action@v1.0.3
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          NEXTAUTH_URL: ${{ env.NEXTAUTH_URL }}
          NEXTAUTH_SECRET: ${{ env.NEXTAUTH_SECRET }}
          AUTH_GOOGLE_ID: ${{ env.AUTH_GOOGLE_ID }}
          AUTH_GOOGLE_SECRET: ${{ env.AUTH_GOOGLE_SECRET }}
          SMTP_HOST: ${{ env.SMTP_HOST }}
          SMTP_PORT: ${{ env.SMTP_PORT }}
          SMTP_USER: ${{ env.SMTP_USER }}
          SMTP_PASS: ${{ env.SMTP_PASS }}
          SMTP_FROM: ${{ env.SMTP_FROM }}
          NEXT_PUBLIC_GA_ID: ${{ env.NEXT_PUBLIC_GA_ID }}
          DISCORD_APPS_LOGIN_WEBHOOK_URL: ${{ env.DISCORD_APPS_LOGIN_WEBHOOK_URL }}
          DISCORD_APPS_REGISTER_WEBHOOK_URL: ${{ env.DISCORD_APPS_REGISTER_WEBHOOK_URL }}
          TARGET_DIR: ${{ env.TARGET_DIR }}
        with:
          host: ${{ env.HOST }}
          username: ${{ env.USERNAME }}
          key: ${{ env.SSH_PRIVATE_KEY }}
          port: ${{ env.SSH_PORT }}
          envs: DATABASE_URL,NEXTAUTH_URL,NEXTAUTH_SECRET,AUTH_GOOGLE_ID,AUTH_GOOGLE_SECRET,SMTP_HOST,SMTP_PORT,SMTP_USER,SMTP_PASS,SMTP_FROM,NEXT_PUBLIC_GA_ID,DISCORD_APPS_LOGIN_WEBHOOK_URL,DISCORD_APPS_REGISTER_WEBHOOK_URL,TARGET_DIR
          script: |
            cd "${TARGET_DIR}"

            echo "Cleaning up old files..."
            rm -rf .next public package.json package-lock.json prisma next.config.ts scripts lib tsconfig.json

            echo "Extracting archive..."
            tar -xzf deploy.tar.gz
            rm deploy.tar.gz

            echo "Updating .env file..."
            sync_env_var() {
              key="$1"
              value="$2"
              touch .env
              if grep -q "^${key}=" .env; then
                grep -v "^${key}=" .env > .env.tmp && mv .env.tmp .env
              fi
              printf '%s=%s\n' "$key" "$value" >> .env
            }

            sync_env_var DATABASE_URL "$DATABASE_URL"
            sync_env_var NEXTAUTH_URL "$NEXTAUTH_URL"
            sync_env_var NEXTAUTH_SECRET "$NEXTAUTH_SECRET"
            sync_env_var AUTH_GOOGLE_ID "$AUTH_GOOGLE_ID"
            sync_env_var AUTH_GOOGLE_SECRET "$AUTH_GOOGLE_SECRET"
            sync_env_var SMTP_HOST "$SMTP_HOST"
            sync_env_var SMTP_PORT "$SMTP_PORT"
            sync_env_var SMTP_USER "$SMTP_USER"
            sync_env_var SMTP_PASS "$SMTP_PASS"
            sync_env_var SMTP_FROM "$SMTP_FROM"
            sync_env_var NEXT_PUBLIC_GA_ID "$NEXT_PUBLIC_GA_ID"
            sync_env_var DISCORD_APPS_LOGIN_WEBHOOK_URL "$DISCORD_APPS_LOGIN_WEBHOOK_URL"
            sync_env_var DISCORD_APPS_REGISTER_WEBHOOK_URL "$DISCORD_APPS_REGISTER_WEBHOOK_URL"
            sync_env_var NEXT_PUBLIC_NEXTAUTH_URL "$NEXTAUTH_URL"
            sync_env_var AUTH_TRUST_HOST "true"
            sync_env_var PORT "3102"

            echo "Installing production dependencies..."
            npm install --omit=dev --no-audit --prefer-offline

            echo "Updating database schema..."
            npx prisma generate
            npx prisma db push --accept-data-loss

            echo "Testing production DB data retrieval..."
            npx -y tsx scripts/test-db-connection.ts

            echo "Restarting PM2..."
            pm2 delete asset-manager || true

            export PORT=3102
            export AUTH_URL="$NEXTAUTH_URL"
            export TRUST_PROXY="1"

            echo "Starting PM2 with NEXTAUTH_URL: $NEXTAUTH_URL"
            pm2 start npm --name asset-manager -- start -- -p 3102 -H 0.0.0.0

            echo "Waiting for app to start..."
            sleep 20
            curl -f http://localhost:3102 || (echo "Health check failed!" && exit 1)
            echo "Deployment successful and app is running."

  release:
    runs-on: ubuntu-latest
    needs: [tag, deploy]
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect prerelease
        id: meta
        run: |
          TAG="${{ needs.tag.outputs.tag }}"
          if [[ "$TAG" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.tag.outputs.tag }}
          generate_release_notes: true
          prerelease: ${{ steps.meta.outputs.prerelease == 'true' }}
          skip_if_release_exists: true

  notify:
    needs: [tag, deploy]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Determine workflow status
        id: status
        run: |
          tag="${{ needs.tag.result }}"
          deploy="${{ needs.deploy.result }}"
          if [ "$tag" = "success" ] && [ "$deploy" = "success" ]; then
            result=success
          elif [ "$tag" = "cancelled" ] || [ "$deploy" = "cancelled" ]; then
            result=cancelled
          else
            result=failure
          fi
          echo "result=$result" >> "$GITHUB_OUTPUT"

      - name: Load secrets from 1Password
        uses: 1password/load-secrets-action@v4
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          OP_ENV_FILE: ".github/deploy.env.tpl"

      - name: Notify Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ env.DISCORD_CI_WEBHOOK_URL }}
          NOTIFY_APP: Asset Manager
          NOTIFY_KIND: デプロイ
          NOTIFY_STATUS: ${{ steps.status.outputs.result }}
        run: bash .github/scripts/discord-notify.sh

  notify-release:
    runs-on: ubuntu-latest
    needs: [tag, deploy, release]
    if: always() && needs.release.result != 'skipped'

    steps:
      - uses: actions/checkout@v6

      - name: Load secrets from 1Password
        uses: 1password/load-secrets-action@v4
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          OP_ENV_FILE: ".github/deploy.env.tpl"

      - name: Notify Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ env.DISCORD_CI_WEBHOOK_URL }}
          NOTIFY_STATUS: ${{ needs.release.result }}
          NOTIFY_APP: Asset Manager
          NOTIFY_KIND: リリース
          NOTIFY_VERSION: ${{ needs.tag.outputs.tag }}
        run: bash .github/scripts/discord-notify.sh
