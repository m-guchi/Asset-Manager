name: Fix Production DB Migration State (temporary)

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Load secrets from 1Password
        uses: 1password/load-secrets-action@v4
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          OP_ENV_FILE: ".github/deploy.env.tpl"

      - name: Construct DATABASE_URL
        run: bash scripts/construct-database-url.sh

      - name: Install SSH Key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ env.SSH_PRIVATE_KEY }}
          known_hosts: "just-a-placeholder-so-we-dont-get-errors"
          if_key_exists: replace

      - name: Adding Known Hosts
        run: ssh-keyscan -p "${SSH_PORT}" -H "${HOST}" >> ~/.ssh/known_hosts

      - name: Resolve failed migration and apply pending migrations
        uses: appleboy/ssh-action@v1.0.3
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          DB_USER: ${{ env.DB_USER }}
          DB_PASSWORD: ${{ env.DB_PASSWORD }}
          DB_HOST: ${{ env.DB_HOST }}
          DB_PORT: ${{ env.DB_PORT }}
          DB_NAME: ${{ env.DB_NAME }}
          TARGET_DIR: ${{ env.TARGET_DIR }}
        with:
          host: ${{ env.HOST }}
          username: ${{ env.USERNAME }}
          key: ${{ env.SSH_PRIVATE_KEY }}
          port: ${{ env.SSH_PORT }}
          envs: DATABASE_URL,DB_USER,DB_PASSWORD,DB_HOST,DB_PORT,DB_NAME,TARGET_DIR
          script: |
            set -e
            cd "${TARGET_DIR}"

            echo "=== permission check: ALTER on User table ==="
            mysql -h "$DB_HOST" -P "$DB_PORT" -u "$DB_USER" -p"$DB_PASSWORD" "$DB_NAME" \
              -e "SHOW GRANTS FOR CURRENT_USER();"

            echo ""
            echo "=== resolve failed migration (mark as rolled back, nothing was actually applied) ==="
            npx prisma migrate resolve --rolled-back 20260711103321_remove_credentials_auth

            echo ""
            echo "=== apply pending migrations ==="
            npx prisma migrate deploy

            echo ""
            echo "=== verify: User.password dropped? ==="
            mysql -h "$DB_HOST" -P "$DB_PORT" -u "$DB_USER" -p"$DB_PASSWORD" "$DB_NAME" \
              -e "SHOW COLUMNS FROM User LIKE 'password';" || echo "(no rows = column dropped, as expected)"

            echo ""
            echo "=== verify: Index/IndexValue tables present? ==="
            mysql -h "$DB_HOST" -P "$DB_PORT" -u "$DB_USER" -p"$DB_PASSWORD" "$DB_NAME" \
              -e "SHOW TABLES LIKE '%Index%';"

            echo ""
            echo "=== verify: migrate status ==="
            npx prisma migrate status
