# ローカル開発用 MySQL（CI の mysql:8.0 と同系）
services:
  mysql:
    image: mysql:8.0
    container_name: asset-manager-mysql
    environment:
      MYSQL_ROOT_PASSWORD: devpassword
      MYSQL_DATABASE: asset_manager_dev
    ports:
      - "3308:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-pdevpassword"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
